<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fantasy Golf Majors Draft</title>
    <meta name="theme-color" content="#0f7a3d" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/cottonwood-icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/cottonwood-icon-192.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero draft-hero">
        <div class="hero-brand">
          <img
            src="/icons/cottonwood-icon-192.png"
            alt="Cottonwood Castle Common League logo"
            class="hero-logo"
          />
          <div class="hero-brand-copy">
            <p class="eyebrow">Snake Draft</p>
            <h1>Fantasy Golf Majors Draft</h1>
            <p id="draft-subtitle" class="subtitle">Loading draft board...</p>
          </div>
        </div>
        <div class="actions">
          <a href="/" class="ghost-link-button">Back to Summary</a>
          <button id="save-draft" type="button" disabled>Save League</button>
          <p id="draft-meta" class="updated-at"></p>
        </div>
      </header>

      <p id="draft-status" class="status">Preparing draft...</p>

      <section class="draft-layout">
        <article class="draft-pane">
          <div class="draft-pane-head">
            <h2 id="on-clock">On the clock</h2>
            <p id="pick-counter" class="footnote"></p>
          </div>
          <div id="team-board" class="draft-team-board"></div>
        </article>

        <article class="draft-pane">
          <div class="draft-pane-head draft-pane-head-stack">
            <h2>Available Players</h2>
            <label class="draft-search" for="player-search">
              <span>Search</span>
              <input id="player-search" type="search" placeholder="Find a player" autocomplete="off" />
            </label>
          </div>
          <div class="table-wrap">
            <table id="available-table" class="draft-players-table">
              <thead>
                <tr>
                  <th scope="col">
                    <button type="button" class="draft-sort-button" data-sort-key="rank" data-sort-label="Rank">
                      <span class="sort-label">Rank</span>
                      <span class="sort-indicator" aria-hidden="true">↕</span>
                    </button>
                  </th>
                  <th scope="col">
                    <button type="button" class="draft-sort-button" data-sort-key="name" data-sort-label="Player">
                      <span class="sort-label">Player</span>
                      <span class="sort-indicator" aria-hidden="true">↕</span>
                    </button>
                  </th>
                  <th scope="col">
                    <button type="button" class="draft-sort-button" data-sort-key="masters" data-sort-label="Masters">
                      <span class="sort-label">Masters</span>
                      <span class="sort-indicator" aria-hidden="true">↕</span>
                    </button>
                  </th>
                  <th scope="col">
                    <button type="button" class="draft-sort-button" data-sort-key="pga" data-sort-label="PGA">
                      <span class="sort-label">PGA</span>
                      <span class="sort-indicator" aria-hidden="true">↕</span>
                    </button>
                  </th>
                  <th scope="col">
                    <button type="button" class="draft-sort-button" data-sort-key="us_open" data-sort-label="U.S. Open">
                      <span class="sort-label">U.S. Open</span>
                      <span class="sort-indicator" aria-hidden="true">↕</span>
                    </button>
                  </th>
                  <th scope="col">
                    <button type="button" class="draft-sort-button" data-sort-key="the_open" data-sort-label="The Open">
                      <span class="sort-label">The Open</span>
                      <span class="sort-indicator" aria-hidden="true">↕</span>
                    </button>
                  </th>
                  <th scope="col">
                    <button type="button" class="draft-sort-button" data-sort-key="overall" data-sort-label="Overall">
                      <span class="sort-label">Overall</span>
                      <span class="sort-indicator" aria-hidden="true">↕</span>
                    </button>
                  </th>
                  <th scope="col">Draft</th>
                </tr>
              </thead>
              <tbody id="available-body"></tbody>
            </table>
          </div>
        </article>
      </section>

      <section class="draft-order-wrap">
        <h3>Draft Order (Snake)</h3>
        <div id="draft-order" class="draft-order"></div>
      </section>
    </main>

    <script src="/draft.js"></script>
  </body>
</html>
