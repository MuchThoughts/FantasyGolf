<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fantasy Golf Majors</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <h1 id="app-title">Fantasy Golf Majors</h1>
        <p id="subtitle" class="subtitle"></p>
        <div class="actions">
          <label class="league-toggle-wrap" for="league-toggle">
            <span>League</span>
            <select id="league-toggle" aria-label="Select league"></select>
          </label>
          <button id="new-league" type="button" class="secondary-button">New League</button>
          <label class="year-toggle-wrap" for="year-toggle">
            <span>Season</span>
            <select id="year-toggle" aria-label="Select season year">
              <option value="2025">2025</option>
              <option value="2026">2026</option>
            </select>
          </label>
          <button id="refresh" type="button">Refresh Data</button>
          <p id="updated-at" class="updated-at"></p>
        </div>
      </header>

      <section id="teams-container" class="view-root"></section>

      <p id="status" class="status">Loading...</p>
    </main>

    <div id="league-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="league-modal-title">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="league-modal-title">Create League</h2>
          <button id="close-league-modal" type="button" class="ghost-button">Close</button>
        </div>
        <form id="league-form" class="league-form">
          <label class="field">
            <span>League Name</span>
            <input id="league-name-input" type="text" maxlength="80" placeholder="League name" required />
          </label>
          <label class="field">
            <span>Setup Mode</span>
            <select id="league-mode-select">
              <option value="selected">Enter already selected players</option>
              <option value="draft">Run a live snake draft</option>
              <option value="async">Run an async draft</option>
            </select>
          </label>
          <label id="draft-rounds-wrap" class="field hidden-field">
            <span>Draft Rounds (Players per User)</span>
            <select id="draft-rounds-select">
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
            </select>
          </label>
          <label id="exclude-scheffler-wrap" class="field field-inline hidden-field">
            <input type="checkbox" id="exclude-scheffler" />
            <span>Exclude Scottie Scheffler from draft</span>
          </label>
          <div class="league-users-head">
            <h3>Users</h3>
            <button id="add-league-user" type="button" class="secondary-button">Add User</button>
          </div>
          <p id="league-form-hint" class="footnote">Each user needs 4-8 golfers. Start with 4 and click + Player to add more.</p>
          <div id="league-users-list" class="league-users-list"></div>
          <div class="modal-actions">
            <button type="submit">Save League</button>
          </div>
          <p id="league-form-status" class="status modal-status"></p>
        </form>
      </div>
    </div>

    <datalist id="player-options"></datalist>

    <script src="/app.js"></script>
  </body>
</html>
